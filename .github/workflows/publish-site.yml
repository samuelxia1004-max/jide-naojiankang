name: Build and publish site

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-site
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build GitHub Pages output
        run: pnpm build:pages

      - name: Copy built site to repository root
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          rm -rf assets index.html 404.html manifest.webmanifest pwa-icon.svg CNAME .nojekyll _redirects
          cp -R app/dist/. .

      - name: Commit published files
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          if [[ -z "$(git status --porcelain -- assets index.html 404.html manifest.webmanifest pwa-icon.svg CNAME .nojekyll _redirects)" ]]; then
            echo "Built site unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets index.html 404.html manifest.webmanifest pwa-icon.svg CNAME .nojekyll _redirects
          git commit -m "Publish built site"
          git push
